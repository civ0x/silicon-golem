<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golem Code</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg-surface: #16213e;
    --bg-panel: #0f3460;
    --border: #2a4a7f;
    --text: #e0e0e0;
    --text-dim: #8899aa;
    --accent: #4ecca3;
    --accent-glow: rgba(78, 204, 163, 0.3);
    --knob-bg: rgba(78, 204, 163, 0.08);
    --knob-border: rgba(78, 204, 163, 0.25);
    --danger: #e74c3c;
    --warn: #f39c12;
    --success: #4ecca3;
    --line-height: 1.7;
    --font-size: 17px;
    --font: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Header --- */
  .header {
    background: var(--bg-surface);
    border-bottom: 2px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
  }

  .status-dot.connected {
    background: var(--success);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  /* --- Tabs --- */
  .tabs {
    display: flex;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* --- Main panels --- */
  .panels {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .panel {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  .panel.active {
    display: flex;
  }

  /* --- Code editor --- */
  .code-container {
    flex: 1;
    overflow: auto;
    padding: 0;
    position: relative;
  }

  .code-wrap {
    display: flex;
    min-height: 100%;
  }

  .line-numbers {
    padding: 16px 0;
    text-align: right;
    color: var(--text-dim);
    font-size: var(--font-size);
    line-height: var(--line-height);
    user-select: none;
    min-width: 44px;
    padding-right: 12px;
    padding-left: 12px;
    background: rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
  }

  .code-editor {
    flex: 1;
    position: relative;
    padding: 16px 16px 16px 12px;
  }

  .code-highlight {
    position: absolute;
    top: 16px;
    left: 12px;
    right: 16px;
    font-size: var(--font-size);
    line-height: var(--line-height);
    font-family: var(--font);
    white-space: pre;
    pointer-events: none;
    color: transparent;
    overflow: hidden;
  }

  .code-textarea {
    width: 100%;
    min-height: 100%;
    background: transparent;
    color: transparent;
    caret-color: var(--accent);
    font-size: var(--font-size);
    line-height: var(--line-height);
    font-family: var(--font);
    border: none;
    outline: none;
    resize: none;
    white-space: pre;
    overflow: hidden;
    padding: 0;
    position: relative;
    z-index: 1;
    tab-size: 4;
  }

  .code-textarea::selection {
    background: rgba(78, 204, 163, 0.2);
    color: transparent;
  }

  .code-highlight .knob-line {
    background: var(--knob-bg);
    border-left: 2px solid var(--knob-border);
    margin-left: -12px;
    padding-left: 10px;
    display: inline-block;
    width: calc(100% + 12px);
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 15px;
    text-align: center;
    padding: 32px;
    line-height: 1.6;
  }

  /* --- Run button bar --- */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .run-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 24px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .run-btn:hover {
    box-shadow: 0 0 16px var(--accent-glow);
    transform: translateY(-1px);
  }

  .run-btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .run-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .run-status {
    font-size: 13px;
    color: var(--text-dim);
    flex: 1;
  }

  .run-status.running { color: var(--warn); }
  .run-status.success { color: var(--success); }
  .run-status.error { color: var(--danger); }

  /* --- Execution log --- */
  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .log-entry {
    padding: 8px 12px;
    margin-bottom: 6px;
    background: var(--bg-surface);
    border-left: 3px solid var(--border);
    border-radius: 0 4px 4px 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .log-entry.success { border-left-color: var(--success); }
  .log-entry.error { border-left-color: var(--danger); }
  .log-entry.running { border-left-color: var(--warn); }

  .log-time {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 2px;
  }

  .log-action {
    color: var(--text);
  }

  .log-detail {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 2px;
  }

  .log-empty {
    color: var(--text-dim);
    text-align: center;
    padding: 32px;
    font-size: 14px;
  }

  /* --- Skills browser --- */
  .skills-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .skill-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .skill-card:hover {
    border-color: var(--accent);
  }

  .skill-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .skill-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .skill-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .skill-author.kid { color: var(--warn); }
  .skill-author.bot { color: var(--text-dim); }

  .skills-empty {
    color: var(--text-dim);
    text-align: center;
    padding: 32px;
    font-size: 14px;
  }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: #3a5a8f; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">GOLEM CODE</span>
  <div class="connection-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">disconnected</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-panel="code">Code</button>
  <button class="tab" data-panel="log">Log</button>
  <button class="tab" data-panel="skills">Skills</button>
</div>

<div class="panels">
  <!-- Code Panel -->
  <div class="panel active" id="panel-code">
    <div class="code-container" id="codeContainer">
      <div class="empty-state" id="emptyState">
        Waiting for the golem to write some code...
      </div>
      <div class="code-wrap" id="codeWrap" style="display:none">
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="code-editor">
          <div class="code-highlight" id="codeHighlight"></div>
          <textarea class="code-textarea" id="codeTextarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </div>
    <div class="action-bar">
      <button class="run-btn" id="runBtn" disabled>RUN</button>
      <span class="run-status" id="runStatus"></span>
    </div>
  </div>

  <!-- Log Panel -->
  <div class="panel" id="panel-log">
    <div class="log-list" id="logList">
      <div class="log-empty">No runs yet.</div>
    </div>
  </div>

  <!-- Skills Panel -->
  <div class="panel" id="panel-skills">
    <div class="skills-list" id="skillsList">
      <div class="skills-empty">No skills saved yet.</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script>
(function() {
  'use strict';

  // --- State ---
  let ws = null;
  let connected = false;
  let currentCode = '';     // last code received from orchestrator
  let lastSentCode = '';    // tracks what we last emitted as edit
  let isRunning = false;

  // --- DOM refs ---
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const emptyState = document.getElementById('emptyState');
  const codeWrap = document.getElementById('codeWrap');
  const lineNumbers = document.getElementById('lineNumbers');
  const codeHighlight = document.getElementById('codeHighlight');
  const codeTextarea = document.getElementById('codeTextarea');
  const codeContainer = document.getElementById('codeContainer');
  const runBtn = document.getElementById('runBtn');
  const runStatus = document.getElementById('runStatus');
  const logList = document.getElementById('logList');
  const skillsList = document.getElementById('skillsList');

  // --- Tabs ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
  });

  // --- WebSocket ---
  function connect() {
    if (ws && ws.readyState <= 1) return;

    ws = new WebSocket('ws://localhost:3001');

    ws.onopen = () => {
      connected = true;
      statusDot.classList.add('connected');
      statusText.textContent = 'connected';
    };

    ws.onclose = () => {
      connected = false;
      statusDot.classList.remove('connected');
      statusText.textContent = 'disconnected';
      // Reconnect after 3 seconds
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      // onclose will fire after this
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }
      handleMessage(msg);
    };
  }

  function send(msg) {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify(msg));
    }
  }

  // --- Message handling ---
  function handleMessage(msg) {
    if (msg.type === 'event') {
      switch (msg.event) {
        case 'code_display':
          onCodeDisplay(msg.data);
          break;
        case 'execution_start':
          onExecutionStart(msg.data);
          break;
        case 'execution_complete':
          onExecutionComplete(msg.data);
          break;
        case 'skills_list':
          onSkillsList(msg.data);
          break;
        case 'ready':
          // Request skills on connect
          send({ type: 'event', event: 'skills_query', data: {} });
          break;
      }
    } else if (msg.type === 'response') {
      // Responses to our queries
      if (msg.data && msg.data.skills) {
        onSkillsList(msg.data);
      }
    }
  }

  // --- Code display ---
  function onCodeDisplay(data) {
    const code = data.code || data.source || '';
    currentCode = code;
    lastSentCode = code;
    showCode(code);
    runBtn.disabled = false;
    runStatus.textContent = '';
    runStatus.className = 'run-status';
  }

  function showCode(code) {
    if (!code) {
      emptyState.style.display = 'flex';
      codeWrap.style.display = 'none';
      return;
    }

    emptyState.style.display = 'none';
    codeWrap.style.display = 'flex';

    codeTextarea.value = code;
    updateHighlight(code);
    updateLineNumbers(code);
    syncHeight();
  }

  function updateHighlight(code) {
    const highlighted = Prism.highlight(code, Prism.languages.python, 'python');
    // Mark "knob" lines — simple assignments near the top (after import)
    const lines = highlighted.split('\n');
    const result = [];
    let pastImport = false;
    let knobZone = true;

    for (let i = 0; i < lines.length; i++) {
      const rawLine = code.split('\n')[i] || '';
      const trimmed = rawLine.trim();

      if (trimmed.startsWith('from ') || trimmed.startsWith('import ')) {
        pastImport = true;
        result.push(lines[i]);
        continue;
      }

      // Knob zone: after import, before first non-assignment non-blank line
      if (pastImport && knobZone) {
        if (trimmed === '' || trimmed.startsWith('#')) {
          result.push(lines[i]);
          continue;
        }
        // Simple assignment: name = value (no dots, no calls on left side)
        if (/^[a-zA-Z_]\w*\s*=\s*/.test(trimmed) && !trimmed.includes('(')) {
          result.push('<span class="knob-line">' + lines[i] + '</span>');
          continue;
        }
        knobZone = false;
      }

      result.push(lines[i]);
    }

    codeHighlight.innerHTML = result.join('\n');
  }

  function updateLineNumbers(code) {
    const count = code.split('\n').length;
    let html = '';
    for (let i = 1; i <= count; i++) {
      html += i + '\n';
    }
    lineNumbers.textContent = html;
  }

  function syncHeight() {
    // Ensure textarea is tall enough for its content
    codeTextarea.style.height = 'auto';
    codeTextarea.style.height = codeTextarea.scrollHeight + 'px';
  }

  // --- Editing ---
  codeTextarea.addEventListener('input', () => {
    const code = codeTextarea.value;
    updateHighlight(code);
    updateLineNumbers(code);
    syncHeight();
    emitEditEvent(code);
  });

  codeTextarea.addEventListener('keydown', (e) => {
    // Tab inserts 4 spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = codeTextarea.selectionStart;
      const end = codeTextarea.selectionEnd;
      const val = codeTextarea.value;
      codeTextarea.value = val.substring(0, start) + '    ' + val.substring(end);
      codeTextarea.selectionStart = codeTextarea.selectionEnd = start + 4;
      codeTextarea.dispatchEvent(new Event('input'));
    }
  });

  // Diff and emit edit events
  function emitEditEvent(newCode) {
    const oldLines = lastSentCode.split('\n');
    const newLines = newCode.split('\n');

    // Find first changed line
    for (let i = 0; i < Math.max(oldLines.length, newLines.length); i++) {
      const oldLine = oldLines[i] || '';
      const newLine = newLines[i] || '';
      if (oldLine !== newLine) {
        send({
          type: 'event',
          event: 'code_panel_edit',
          data: {
            line: i + 1,
            old_value: oldLine,
            new_value: newLine,
            full_source: newCode
          }
        });
        break;
      }
    }

    lastSentCode = newCode;
  }

  // --- Scroll tracking ---
  let scrollTimer = null;
  codeContainer.addEventListener('scroll', () => {
    if (scrollTimer) clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const lineH = parseFloat(getComputedStyle(codeTextarea).lineHeight) || 28;
      const scrollTop = codeContainer.scrollTop;
      const viewHeight = codeContainer.clientHeight;
      const firstVisible = Math.floor(scrollTop / lineH) + 1;
      const lastVisible = Math.min(
        Math.ceil((scrollTop + viewHeight) / lineH),
        (codeTextarea.value || '').split('\n').length
      );

      send({
        type: 'event',
        event: 'code_panel_scroll',
        data: {
          first_visible_line: firstVisible,
          last_visible_line: lastVisible
        }
      });
    }, 300);
  });

  // --- Run ---
  runBtn.addEventListener('click', () => {
    if (isRunning || !connected) return;

    const code = codeTextarea.value;
    if (!code.trim()) return;

    send({
      type: 'event',
      event: 'code_panel_run',
      data: {
        source: code,
        modified: code !== currentCode
      }
    });

    isRunning = true;
    runBtn.disabled = true;
    runStatus.textContent = 'running...';
    runStatus.className = 'run-status running';

    addLogEntry({
      action: 'Run' + (code !== currentCode ? ' (modified)' : ''),
      status: 'running',
      detail: firstMeaningfulLine(code)
    });
  });

  // --- Execution events from orchestrator ---
  function onExecutionStart(data) {
    isRunning = true;
    runBtn.disabled = true;
    runStatus.textContent = 'running...';
    runStatus.className = 'run-status running';
  }

  function onExecutionComplete(data) {
    isRunning = false;
    runBtn.disabled = false;

    const success = data.status === 'success' || data.status === 'partial';
    runStatus.textContent = success
      ? (data.summary || 'done')
      : (data.error || 'something went wrong');
    runStatus.className = 'run-status ' + (success ? 'success' : 'error');

    // Update last log entry
    updateLastLogEntry(success ? 'success' : 'error', data.summary || data.error || '');
  }

  // --- Execution log ---
  function addLogEntry(info) {
    // Remove empty placeholder
    const empty = logList.querySelector('.log-empty');
    if (empty) empty.remove();

    const entry = document.createElement('div');
    entry.className = 'log-entry ' + (info.status || '');
    entry.innerHTML =
      '<div class="log-time">' + formatTime(new Date()) + '</div>' +
      '<div class="log-action">' + escapeHtml(info.action) + '</div>' +
      (info.detail ? '<div class="log-detail">' + escapeHtml(info.detail) + '</div>' : '');

    logList.appendChild(entry);
    logList.scrollTop = logList.scrollHeight;
  }

  function updateLastLogEntry(status, detail) {
    const entries = logList.querySelectorAll('.log-entry');
    if (entries.length === 0) return;
    const last = entries[entries.length - 1];
    last.className = 'log-entry ' + status;
    if (detail) {
      let detailEl = last.querySelector('.log-detail');
      if (!detailEl) {
        detailEl = document.createElement('div');
        detailEl.className = 'log-detail';
        last.appendChild(detailEl);
      }
      detailEl.textContent = detail;
    }
  }

  // --- Skills ---
  function onSkillsList(data) {
    const skills = data.skills || [];
    if (skills.length === 0) {
      skillsList.innerHTML = '<div class="skills-empty">No skills saved yet.</div>';
      return;
    }

    skillsList.innerHTML = '';
    skills.forEach(skill => {
      const card = document.createElement('div');
      card.className = 'skill-card';
      card.innerHTML =
        '<div class="skill-name">' + escapeHtml(skill.name) + '</div>' +
        '<div class="skill-desc">' + escapeHtml(skill.description || '') + '</div>' +
        '<div class="skill-meta">' +
          '<span class="skill-author ' + (skill.author || 'bot') + '">' +
            (skill.author === 'kid' ? 'yours' : skill.author === 'modified' ? 'modified by you' : 'golem') +
          '</span>' +
          (skill.times_used ? '<span>used ' + skill.times_used + 'x</span>' : '') +
        '</div>';

      card.addEventListener('click', () => {
        if (skill.source) {
          showCode(skill.source);
          currentCode = skill.source;
          lastSentCode = skill.source;
          runBtn.disabled = false;
          // Switch to code tab
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.querySelector('[data-panel="code"]').classList.add('active');
          document.getElementById('panel-code').classList.add('active');
        }
      });

      skillsList.appendChild(card);
    });
  }

  // --- Helpers ---
  function formatTime(d) {
    return d.getHours().toString().padStart(2, '0') + ':' +
           d.getMinutes().toString().padStart(2, '0') + ':' +
           d.getSeconds().toString().padStart(2, '0');
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function firstMeaningfulLine(code) {
    const lines = code.split('\n');
    for (const line of lines) {
      const t = line.trim();
      if (t && !t.startsWith('#') && !t.startsWith('from ') && !t.startsWith('import ')) {
        return t.length > 60 ? t.substring(0, 57) + '...' : t;
      }
    }
    return '';
  }

  // --- Start ---
  connect();
})();
</script>
</body>
</html>
